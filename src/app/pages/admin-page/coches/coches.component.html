<div class="w-full mw-992 flex align-items-center bg-white mt-4 p-3">

  <div class="col-6 flex justify-content-center">
    <button class="w-8rem md:w-10rem h-2rem md:h-3rem text-white m-3 font-bold cursor-pointer md:text-lg"
      (click)="mostrarCrear()">
      Añadir un coche</button>
  </div>
  <div class="col-6 flex justify-content-center">
    <button class="w-8rem md:w-10rem h-2rem md:h-3rem text-white m-3 font-bold cursor-pointer md:text-lg"
      (click)="mostrarListar()">
      Listar coches existentes</button>
  </div>

</div>

<div *ngIf="!listarSelec && !crearSelec" class="h-30rem"></div>

<div *ngIf="crearSelec" class="w-full mw-992 flex align-items-center bg-white mt-4 p-3">
  <form [formGroup]="formCrearCoche" class="grid grid-nogutter align-items-center">

    <div class="col-12 md:col-6 mt-2 mb-2 pl-7 md:pl-0">
      <label for="marca">Marca </label>
      <select class="mb-1 p-2" formControlName="marca" id="marca" class="" required>
        <option *ngFor="let marca of marcas" [value]="marca.id">{{ marca.nombre }}</option>
      </select>
    </div>

    <div class="separador mt-2 mb-2 md:hidden"></div>

    <div class="col-12 md:col-6 mt-2 mb-2 pl-7 md:pl-0">
      <label for="carroceria">Carrocería </label>
      <select class="mb-1 p-2" formControlName="carroceria" id="carroceria" class="" required>
        <option class="pr-2" *ngFor="let carroceria of carrocerias" [value]="carroceria.id">{{ carroceria.nombre }}</option>
      </select>
    </div>

    <div class="separador mt-2 mb-2"></div>

    <div class="col-12 md:col-6 mt-2 mb-2 pl-7 md:pl-0">
      <label for="modelo">Modelo </label>
      <input class="mb-1 p-2"formControlName="modelo" type="text" id="modelo" required>
    </div>

    <div class="separador mt-2 mb-2 md:hidden"></div>

    <div class="col-12 md:col-6 mt-2 mb-2 pl-7 md:pl-0">
      <label for="anio">Año </label>
      <select class="mb-1 p-2" formControlName="anio" id="anio" required>
        <option class="pr-2" *ngFor="let anio of anios" [value]="anio">{{ anio }}</option>
      </select>
    </div>

    <div class="separador mt-2 mb-2"></div>

    <div class="col-12 md:col-6 mt-2 mb-2 pl-7 md:pl-0">
      <label for="color">Color </label>
      <input class="mb-1 p-2" formControlName="color" id="color" type="text" required>
    </div>

    <div class="separador mt-2 mb-2 md:hidden"></div>

    <div class="col-12 md:col-6 mt-2 mb-2 pl-7 md:pl-0">
      <label for="cambio">Cambio </label>
      <select class="mb-1 p-2" formControlName="cambio" id="cambio" required>
        <option class="pr-2" value="Automático">Automático</option>
        <option class="pr-2" value="Manual">Manual</option>
      </select>
    </div>

    <div class="separador mt-2 mb-2"></div>

    <div class="col-12 md:col-6 mt-2 mb-2 pl-7 md:pl-0">
      <label for="kilometros">Kilómetros </label>
      <input class="mb-1 p-2" formControlName="kilometros" min="0" step="0.01" id="kilometros" max="999999" type="number" required>
      <span class="ml-2">Km</span>
    </div>

    <div class="separador mt-2 mb-2 md:hidden"></div>

    <div class="col-12 md:col-6 mt-2 mb-2 pl-7 md:pl-0">
      <label for="autonomia">Autonomía </label>
      <input class="mb-1 p-2" formControlName="autonomia" min="0" max="1500" id="autonomia" type="number" required>
      <span class="ml-2">Km</span>
    </div>

    <div class="separador mt-2 mb-2"></div>

    <div class="col-12 md:col-6 mt-2 mb-2 pl-7 md:pl-0">
      <label for="potencia">Potencia </label>
      <input class="mb-1 p-2" formControlName="potencia" min="0" max="2000" id="potencia" type="number" required>
      <span class="ml-2">CV</span>
    </div>

    <div class="separador mt-2 mb-2 md:hidden"></div>

    <div class="col-12 md:col-6 mt-2 mb-2 pl-7 md:pl-0">
      <label for="precio">Precio </label>
      <input class="mb-1 p-2" formControlName="precio" min="0" step="0.01" id="precio" type="number" required>
      <span class="ml-2">Euros</span>
    </div>

    <div class="separador mt-2 mb-2"></div>

    <div class="col-12 md:col-6 mt-2 mb-2 pl-7 md:pl-0">
      <label for="descripcion">Descripción </label><br>
      <textarea class="mb-1 p-2" formControlName="descripcion" type="text" id="descripcion" rows="4" cols="30" required></textarea>
    </div>

    <div class="separador mt-2 mb-2 md:hidden"></div>

    <div class="col-12 md:col-6 mt-2 mb-2 pl-7 md:pl-0 flex justify-content-center">
      <button class="w-8rem md:w-10rem h-2rem md:h-3rem text-white m-3 font-bold cursor-pointer md:text-lg"
      (click)="guardarCoche()" [disabled]="formCrearCoche.invalid">
        Guardar cambios</button>
      <button class="reset w-8rem md:w-10rem h-2rem md:h-3rem text-white m-3 font-bold cursor-pointer md:text-lg"
      (click)="resetForm()">
        Reiniciar</button>
    </div>

  </form>
</div>

<div *ngIf="listarSelec" class="w-full mw-992 flex align-items-center bg-white mt-4 p-3">

</div>
