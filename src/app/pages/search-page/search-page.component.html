<div class="w-full mw-992 grid grid-nogutter align-items-center bg-white mt-4 p-3">

  <div class="col-12 lg:col-6 mb-3 p-2">
    <div class=" btnSelect flex p-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="10" cy="10" r="7" stroke="#25d366" stroke-width="2" fill="transparent" />
        <line x1="15" y1="15" x2="21" y2="21" stroke="#25d366" stroke-width="2" />
      </svg>
      <input type="text" placeholder="Buscar coche..." class="ml-2 border-none w-full md:text-lg"
        [(ngModel)]="textoBuscar" (input)="filtrarCochesModelo()">
    </div>
  </div>

  <div class="col-12 lg:col-6 flex flex-column sm:flex-row align-items-center mb-3 p-2">

    <div class="w-6 lg:hidden mb-3 sm:mb-0 sm:mr-3">
      <button class="btnSelect relative flex align-items-center justify-content-center w-full" (click)="modalFiltros()">
        <span class="font-bold">Filtrar por...</span>
        <img src="" alt="">
      </button>

    </div>

    <div class="w-6 lg:w-full">
      <button class="btnSelect relative flex align-items-center justify-content-center w-full  ">
        <span class="font-bold">Ordenar por...</span>
        <img src="" alt="">
        <select class="w-full appearance-none absolute top-0 right-0 left-0 bottom-0 opacity-0 cursor-pointer
          text-center" name="ordenar" id="ordenar" #selectOrd (change)="ordenarCoches(selectOrd.value)">
          <option *ngFor="let opcion of opcionesOrdenamiento" [value]="opcion.id">{{opcion.label}}</option>
        </select>
      </button>
    </div>

  </div>

</div>

<div class="w-full mw-992 flex bg-white mt-4 p-3">
  <div class="hidden lg:flex w-3 h-full ">
    <div>Filtrar resultados</div>
  </div>

  <div class="w-full lg:w-9 grid grid-nogutter align-items-center justify-content-around">
    <app-car-card *ngFor="let coche of cochesFiltrados" [coche]="coche" [marcas]="marcas" [carrocerias]="carrocerias"
      [cambios]="cambios"></app-car-card>
  </div>

</div>


<div *ngIf="modalVisible"
  class="modal-overlay fixed top-0 left-0 right-0 bottom-0 flex align-items-center justify-content-center">
  <div class="modal-content h-screen w-screen relative bg-white md:h-auto md:w-full">
    <button class="" (click)="modalFiltros()">X</button>

    <div class="filter-section">
      <button class="filter-toggle" (click)="desplegarFiltros('cambios')">
        Cambios
      </button>

      <div *ngIf="mostrarCambios" class="filter-options">
        <ul>
          <li *ngFor="let cambio of cambios">
            <button id="cambio" (click)="aplicarFiltro(cambio, $event)">{{cambio.tipo}}</button>
          </li>
        </ul>
      </div>

    </div>

    <div class="filter-section">
      <button class="filter-toggle" (click)="desplegarFiltros('carrocerias')">
        Carrocerias
      </button>

      <div *ngIf="mostrarCarrocerias" class="filter-options">
        <ul>
          <li *ngFor="let carroceria of carrocerias">
            <button id="carroceria" (click)="aplicarFiltro(carroceria, $event)">{{carroceria.nombre}}</button>
          </li>
        </ul>
      </div>

    </div>

    <div class="filter-section">
      <button class="filter-toggle" (click)="desplegarFiltros('marcas')">
        Marcas
      </button>

      <div *ngIf="mostrarMarcas" class="filter-options">
        <ul>
          <li *ngFor="let marca of marcas">
            <button id="marca" (click)="aplicarFiltro(marca, $event)">{{marca.nombre}}</button>
          </li>
        </ul>
      </div>

    </div>

  </div>
