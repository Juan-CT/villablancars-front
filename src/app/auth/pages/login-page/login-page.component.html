<h1>Iniciar sesión</h1>
<div class="separador"></div>
<div>


  <form class="flex flex-column">
    <label for="email">Email:</label>
    <input type="email" placeholder="Introduce tu email">

    <label for="password">Contraseña:</label>
    <input type="password" placeholder="Introduce tu contraseña">

    <div class="flex align-items-center flex-column mt-3 mb-3">
      <button type="button" class="border-none login text-white text-lg cursor-pointer font-bold mb-3">
        Iniciar sesión
      </button>

      <button type="button" (click)="irARegistro()" class="reg bg-white text-lg cursor-pointer font-bold">
        ¿No tienes cuenta? Regístrate
      </button>
    </div>
  </form>
</div>
